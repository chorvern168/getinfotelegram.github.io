<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>បំពេញព័ត៌មាន</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: khmer os system, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; font-family: khmer os system, sans-serif; }
        button { width: 100%; padding: 10px; background-color: #0088cc; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h3>សូមបំពេញព័ត៌មានខាងក្រោម/Please Input Information:</h3>
    <div class="form-group">
        <label>លេខកាត/Card ID:</label>
        <input type="text" id="card_id" required>
        <label>ឈ្មោះ/Name:</label>
        <input type="text" id="name" required>
        <label>តួនាទី/Position:</label>
        <input type="text" id="position" required>

    </div>
    <div class="form-group">
        <label>ផ្នែក/Department:</label>
        <select id="department">
            <option value="IT">Procurement</option>
            <option value="Accounting">Finance</option>
            <option value="HR">Sales & Marketing</option>
            <option value="Marketing">HR & Admin</option>
            <option value="Marketing">IT</option>
            <option value="Marketing">Property</option>
            <option value="Marketing">Warehouse</option>
            <option value="Marketing">Factory</option>
            <option value="Marketing">Construction</option>
            <option value="Marketing">QC</option>
            <option value="Marketing">Technical</option>
        </select>
    </div>
    <button onclick="sendData()" style="font-family: khmer os system, sans-serif;">បញ្ជូនព័ត៌មាន/Submit</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // ពង្រីកផ្ទាំងឱ្យធំ

        function sendData() {
            const name = document.getElementById('name').value;
            const position = document.getElementById('position').value;
            const cardId = document.getElementById('card_id').value;
            const dept = document.getElementById('department').value;

            if(!name || !cardId || !position) {
                alert("សូមបំពេញព័ត៌មានឱ្យបានគ្រប់គ្រាន់!");
                return;
            }

            // ប្រមូលទិន្នន័យផ្ញើទៅកាន់ Bot វិញជាទម្រង់ JSON
            const data = {
                name: name,
                position: position,
                card_id: cardId,
                department: dept
            };

            tg.sendData(JSON.stringify(data)); // ផ្ញើទៅ Bot
            tg.close(); // បិទផ្ទាំង WebApp
        }
    </script>
</body>
</html>
